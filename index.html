```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handwritten OCR Pro</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:14px;
    margin-bottom:20px;
}

input,button{
    padding:12px;
    border:none;
    border-radius:8px;
    margin:8px 0;
}

button{
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

textarea{
    width:100%;
    height:250px;
    border-radius:10px;
    padding:15px;
    resize:none;
    font-size:15px;
}

.stat{
    margin:8px 0;
}

.history-item{
    background:#334155;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>📝 Handwritten OCR Pro</h1>

<div class="card">
<input type="file" id="fileInput">
<button onclick="uploadFile()">Transcribe Notes</button>
</div>

<div class="card">
<div class="stat">⚡ Speed: <span id="speed">0</span> sec</div>
<div class="stat">🎯 Confidence: <span id="confidence">0</span>%</div>
<div class="stat">📄 Words: <span id="words">0</span></div>
</div>

<div class="grid">

<div class="card">
<h3>📄 Raw OCR Text</h3>
<textarea id="rawText"></textarea>
</div>

<div class="card">
<h3>✨ Cleaned Text</h3>
<textarea id="cleanText"></textarea>
</div>

</div>

<div class="card">
<h3>🏷️ Keywords</h3>
<div id="keywords"></div>
</div>

<div class="card">
<h3>🔍 Entities</h3>
<div id="entities"></div>
</div>

<div class="card">
<button onclick="downloadTXT()">Download TXT</button>
<button onclick="window.print()">Download PDF</button>
</div>

<div class="card">
<h3>🕘 History</h3>
<div id="history"></div>
</div>

</div>

<script>
const API = "http://127.0.0.1:8000/api/transcribe";

function saveHistory(text){
    let items = JSON.parse(localStorage.getItem("ocrHistory") || "[]");
    items.unshift(text);
    items = items.slice(0,5);
    localStorage.setItem("ocrHistory", JSON.stringify(items));
    renderHistory();
}

function renderHistory(){
    let items = JSON.parse(localStorage.getItem("ocrHistory") || "[]");
    let html = "";
    items.forEach(x=>{
        html += `<div class="history-item">${x.substring(0,120)}</div>`;
    });
    document.getElementById("history").innerHTML = html;
}

async function uploadFile(){
    const file = document.getElementById("fileInput").files[0];
    if(!file){
        alert("Choose image first");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    const start = performance.now();

    const res = await fetch(API,{
        method:"POST",
        body:formData
    });

    const data = await res.json();

    const end = performance.now();

    document.getElementById("confidence").innerText =
    data.ocr.average_confidence ?? 0;

    document.getElementById("words").innerText =
    data.ocr.word_count ?? 0;

    document.getElementById("rawText").value =
    data.ocr.raw_text ?? "";

    document.getElementById("cleanText").value =
    data.nlp.corrected_text ?? "";

    document.getElementById("keywords").innerText =
    data.nlp.keywords ? data.nlp.keywords.join(", ") : "None";

    document.getElementById("entities").innerText =
    data.nlp.entities && data.nlp.entities.length > 0
        ? JSON.stringify(data.nlp.entities, null, 2)
        : "None";

saveHistory(data.nlp.corrected_text ?? "");
}

function downloadTXT(){
    const text = document.getElementById("cleanText").value;
    const blob = new Blob([text], {type:"text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "ocr_output.txt";
    a.click();
}

renderHistory();
</script>

</body>
</html>
```
